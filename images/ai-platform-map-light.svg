<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="560" viewBox="0 0 1280 560" role="img" aria-labelledby="title desc">
  <title id="title">AI Communication Platform Surface</title>
  <desc id="desc">Architecture map for an AI communication platform with channels, workflow orchestration, AI runtime, and operations.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#0969DA"/>
    </marker>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0969DA"/>
      <stop offset="0.56" stop-color="#1A7F37"/>
      <stop offset="1" stop-color="#B58407"/>
    </linearGradient>
  </defs>
  <style>
    .font { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
    .title { font-size: 34px; font-weight: 800; fill: #24292F; }
    .subtitle { font-size: 16px; fill: #57606A; }
    .column { font-size: 14px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; fill: #0969DA; }
    .card-title { font-size: 17px; font-weight: 750; fill: #24292F; }
    .card-body { font-size: 13px; fill: #57606A; }
    .chip { font-size: 13px; font-weight: 650; fill: #24292F; }
    .link { fill: none; stroke: #0969DA; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); opacity: .82; }
  </style>
  <rect width="1280" height="560" rx="18" fill="#FFFFFF"/>
  <rect x="22" y="22" width="1236" height="516" rx="16" fill="#F6F8FA" stroke="#D0D7DE"/>
  <rect x="54" y="52" width="312" height="5" rx="2.5" fill="url(#header)"/>
  <text class="font title" x="54" y="96">AI Communication Platform Surface</text>
  <text class="font subtitle" x="54" y="124">Real-time voice agents, workflow automation, LLM operations, and production observability.</text>

  <text class="font column" x="60" y="170">Channels</text>
  <text class="font column" x="360" y="170">Workflow Core</text>
  <text class="font column" x="660" y="170">AI Runtime</text>
  <text class="font column" x="960" y="170">Operations</text>

  <rect x="60" y="190" width="250" height="72" rx="9" fill="#FFFFFF" stroke="#D0D7DE"/>
  <text class="font card-title" x="82" y="221">Voice Calls</text>
  <text class="font card-body" x="82" y="244">Inbound, outbound, SIP routing</text>

  <rect x="60" y="286" width="250" height="72" rx="9" fill="#FFFFFF" stroke="#D0D7DE"/>
  <text class="font card-title" x="82" y="317">SMS + Messaging</text>
  <text class="font card-body" x="82" y="340">Follow-ups, reminders, replies</text>

  <rect x="60" y="382" width="250" height="72" rx="9" fill="#FFFFFF" stroke="#D0D7DE"/>
  <text class="font card-title" x="82" y="413">CRM + Leads</text>
  <text class="font card-body" x="82" y="436">Lead lifecycle and customer state</text>

  <rect x="360" y="190" width="250" height="72" rx="9" fill="#FFFFFF" stroke="#D0D7DE"/>
  <text class="font card-title" x="382" y="221">Campaign Workflow</text>
  <text class="font card-body" x="382" y="244">Sequencing, retries, guardrails</text>

  <rect x="360" y="286" width="250" height="72" rx="9" fill="#FFFFFF" stroke="#D0D7DE"/>
  <text class="font card-title" x="382" y="317">Lead State Machine</text>
  <text class="font card-body" x="382" y="340">Progression, eligibility, RBAC</text>

  <rect x="360" y="382" width="250" height="72" rx="9" fill="#FFFFFF" stroke="#D0D7DE"/>
  <text class="font card-title" x="382" y="413">Booking + Outcomes</text>
  <text class="font card-body" x="382" y="436">Qualification, calendar, reporting</text>

  <rect x="660" y="190" width="250" height="72" rx="9" fill="#FFFFFF" stroke="#D0D7DE"/>
  <text class="font card-title" x="682" y="221">LiveKit + SIP</text>
  <text class="font card-body" x="682" y="244">Low-latency media sessions</text>

  <rect x="660" y="286" width="250" height="72" rx="9" fill="#FFFFFF" stroke="#D0D7DE"/>
  <text class="font card-title" x="682" y="317">Python Voice Agent</text>
  <text class="font card-body" x="682" y="340">STT, LLM, tools, TTS loop</text>

  <rect x="660" y="382" width="250" height="72" rx="9" fill="#FFFFFF" stroke="#D0D7DE"/>
  <text class="font card-title" x="682" y="413">LLM Tool Router</text>
  <text class="font card-body" x="682" y="436">RAG, actions, fallback providers</text>

  <rect x="960" y="190" width="250" height="72" rx="9" fill="#FFFFFF" stroke="#D0D7DE"/>
  <text class="font card-title" x="982" y="221">PostgreSQL + Redis</text>
  <text class="font card-body" x="982" y="244">Tenant data, cache, sessions</text>

  <rect x="960" y="286" width="250" height="72" rx="9" fill="#FFFFFF" stroke="#D0D7DE"/>
  <text class="font card-title" x="982" y="317">RabbitMQ Events</text>
  <text class="font card-body" x="982" y="340">Inbox/outbox, async delivery</text>

  <rect x="960" y="382" width="250" height="72" rx="9" fill="#FFFFFF" stroke="#D0D7DE"/>
  <text class="font card-title" x="982" y="413">Langfuse + SigNoz</text>
  <text class="font card-body" x="982" y="436">Prompts, traces, metrics, costs</text>

  <path class="link" d="M310 226 H352"/>
  <path class="link" d="M310 322 H352"/>
  <path class="link" d="M310 418 H352"/>
  <path class="link" d="M610 226 H652"/>
  <path class="link" d="M610 322 H652"/>
  <path class="link" d="M610 418 H652"/>
  <path class="link" d="M910 226 H952"/>
  <path class="link" d="M910 322 H952"/>
  <path class="link" d="M910 418 H952"/>
  <path class="link" d="M785 262 V278"/>
  <path class="link" d="M785 358 V374"/>
  <path class="link" d="M1085 262 V278"/>
  <path class="link" d="M1085 358 V374"/>

  <rect x="54" y="492" width="130" height="32" rx="16" fill="#FFFFFF" stroke="#D0D7DE"/>
  <text class="font chip" x="84" y="513">Multi-tenant</text>
  <rect x="198" y="492" width="130" height="32" rx="16" fill="#FFFFFF" stroke="#D0D7DE"/>
  <text class="font chip" x="229" y="513">Low latency</text>
  <rect x="342" y="492" width="132" height="32" rx="16" fill="#FFFFFF" stroke="#D0D7DE"/>
  <text class="font chip" x="371" y="513">Event-driven</text>
  <rect x="488" y="492" width="116" height="32" rx="16" fill="#FFFFFF" stroke="#D0D7DE"/>
  <text class="font chip" x="518" y="513">Observable</text>
  <rect x="618" y="492" width="112" height="32" rx="16" fill="#FFFFFF" stroke="#D0D7DE"/>
  <text class="font chip" x="651" y="513">PromptOps</text>
</svg>
