<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Oleksii Popov - AI Engineering Leader</title>
  <desc id="desc">Dark GitHub profile banner for Oleksii Popov, focused on AI-native products, real-time voice agents, and event-driven systems.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0D1117"/>
      <stop offset="0.58" stop-color="#0D1117"/>
      <stop offset="1" stop-color="#161B22"/>
    </linearGradient>
    <linearGradient id="accent" x1="120" y1="82" x2="1120" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#58A6FF"/>
      <stop offset="0.46" stop-color="#3FB950"/>
      <stop offset="1" stop-color="#F2CC60"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#8B949E" stroke-opacity="0.10" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1280" height="420" rx="28" fill="url(#bg)"/>
  <rect width="1280" height="420" rx="28" fill="url(#grid)"/>
  <path d="M82 318 C212 218 304 318 426 220 C552 119 654 188 782 104 C913 18 1044 72 1195 30" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" opacity="0.78"/>
  <path d="M78 344 C260 267 365 372 516 262 C638 174 746 230 872 164 C1004 95 1104 135 1204 92" stroke="#58A6FF" stroke-width="1.4" stroke-linecap="round" opacity="0.30"/>

  <g opacity="0.95">
    <rect x="72" y="64" width="148" height="34" rx="17" fill="#161B22" stroke="#30363D"/>
    <circle cx="96" cy="81" r="5" fill="#58A6FF"/>
    <text x="112" y="86" fill="#C9D1D9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">AI PLATFORM</text>
  </g>

  <text x="72" y="164" fill="#F0F6FC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="58" font-weight="800" letter-spacing="0">Oleksii Popov</text>
  <text x="76" y="211" fill="#58A6FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25" font-weight="700">Engineering Leader building AI-native communication systems</text>
  <text x="76" y="254" fill="#C9D1D9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="500">Real-time voice agents · LLM infrastructure · event-driven backends · observability</text>

  <g transform="translate(76 300)">
    <rect x="0" y="0" width="156" height="36" rx="10" fill="#1F6FEB"/>
    <text x="18" y="24" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="800">LiveKit + SIP</text>
    <rect x="172" y="0" width="122" height="36" rx="10" fill="#238636"/>
    <text x="190" y="24" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="800">NestJS</text>
    <rect x="310" y="0" width="143" height="36" rx="10" fill="#9E6A03"/>
    <text x="328" y="24" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="800">Langfuse</text>
    <rect x="469" y="0" width="162" height="36" rx="10" fill="#30363D"/>
    <text x="487" y="24" fill="#F0F6FC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="800">OpenTelemetry</text>
  </g>

  <g transform="translate(912 84)">
    <rect x="0" y="0" width="278" height="242" rx="22" fill="#161B22" fill-opacity="0.92" stroke="#30363D"/>
    <text x="28" y="52" fill="#F0F6FC" font-family="JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="18" font-weight="800">system.signal</text>
    <text x="28" y="92" fill="#58A6FF" font-family="JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="14">voice.latency &lt; target</text>
    <text x="28" y="122" fill="#3FB950" font-family="JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="14">prompts.versioned = true</text>
    <text x="28" y="152" fill="#F2CC60" font-family="JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="14">events.reliable = inbox/outbox</text>
    <text x="28" y="182" fill="#79C0FF" font-family="JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="14">traces.end_to_end = true</text>
    <rect x="28" y="204" width="222" height="8" rx="4" fill="#30363D"/>
    <rect x="28" y="204" width="176" height="8" rx="4" fill="url(#accent)"/>
  </g>
</svg>
